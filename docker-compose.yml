version: "3.9"

services:
  # ── PostgreSQL Database ────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: vericred-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vericred
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vericred-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/vericred
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-super-secret-change-in-production}
      ED25519_PRIVATE_KEY_HEX: ${ED25519_PRIVATE_KEY_HEX:-}
      ISSUER_DID: ${ISSUER_DID:-did:vericred:issuer:primary}
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
      FRONTEND_URL: http://localhost:3000
      DEBUG: "false"
    ports:
      - "8000:8000"

  # ── Next.js Frontend ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: vericred-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
